<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片遮罩工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvasContainer {
            touch-action: none; /* 禁用默认手势，方便拖拽 */
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl flex flex-col md:flex-row max-w-5xl w-full overflow-hidden">
        
        <div class="w-full md:w-80 p-6 border-r border-gray-100 space-y-6">
            <h1 class="text-2xl font-bold text-gray-800">图片遮罩工具</h1>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">1. 选择你的照片</label>
                <button onclick="document.getElementById('userFile').click()" class="w-full border-2 border-dashed border-gray-300 py-4 rounded-lg hover:border-indigo-500 transition text-gray-500">
                    📂 选择本地图片
                </button>
                <input type="file" id="userFile" accept="image/*" class="hidden">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">2. 图片缩放 (<span id="zoomVal">100</span>%)</label>
                <input type="range" id="zoomRange" min="10" max="300" value="100" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>

            <button id="downloadBtn" class="w-full bg-slate-500 text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-slate-600 transition">
                📥 合并下载
            </button>

            <div class="bg-yellow-50 p-3 rounded-lg text-xs text-yellow-700">
                💡 提示：在右侧预览区可以按住图片拖动位置，使用滚轮缩放。
            </div>
        </div>

        <div class="flex-1 bg-gray-200 p-8 flex items-center justify-center" id="canvasContainer">
            <canvas id="mainCanvas" width="800" height="800" class="max-w-full h-auto bg-white shadow-lg rounded-lg cursor-move"></canvas>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const zoomRange = document.getElementById('zoomRange');
    
    // 1. 定义全局变量
    const MASK_SRC = 'GoogleOne.png'; 
    let maskImg = new Image();
    let userImg = null; // 用户上传的照片对象
    
    let imgX = canvas.width / 2;
    let imgY = canvas.height / 2;
    let imgScale = 1.0;
    
    let isDragging = false;
    let startX, startY;

    // 2. 初始化加载底片（遮罩）
    maskImg.src = MASK_SRC;
    maskImg.onload = () => {
        console.log("底片加载成功");
        draw();
    };

    // 3. 处理用户上传图片（修正后的逻辑）
    document.getElementById('userFile').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const tempImg = new Image();
            tempImg.onload = () => {
                userImg = tempImg; // 将加载好的图片赋给全局变量
                
                // 自动调整初始比例，使图片至少能填满画布的一边
                const ratio = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
                imgScale = ratio; 
                imgX = canvas.width / 2;
                imgY = canvas.height / 2;
                
                console.log("用户图片加载成功，开始重绘");
                draw(); 
            };
            tempImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 4. 核心绘制函数（严格控制层级）
    function draw() {
        // A. 清空画布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // B. 先画用户照片（底层）
        if (userImg) {
            ctx.save();
            const drawW = userImg.width * imgScale;
            const drawH = userImg.height * imgScale;
            ctx.drawImage(userImg, imgX - drawW / 2, imgY - drawH / 2, drawW, drawH);
            ctx.restore();
        }

        // C. 后画彩色圆环底片（顶层）
        // 使用 complete 属性确保底片已加载，否则会画出空白
        if (maskImg.complete) {
            ctx.drawImage(maskImg, 0, 0, canvas.width, canvas.height);
        }
    }

    // 5. 交互逻辑：缩放控制
    zoomRange.oninput = (e) => {
        const val = e.target.value;
        document.getElementById('zoomVal').innerText = val;
        if (userImg) {
            const baseScale = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
            imgScale = baseScale * (val / 100);
            draw();
        }
    };

    // 6. 交互逻辑：拖拽支持
    canvas.onmousedown = (e) => {
        isDragging = true;
    };

    window.onmousemove = (e) => {
        if (!isDragging || !userImg) return;
        const rect = canvas.getBoundingClientRect();
        // 计算鼠标位移并换算为画布坐标
        const dx = e.movementX * (canvas.width / rect.width);
        const dy = e.movementY * (canvas.height / rect.height);
        imgX += dx;
        imgY += dy;
        draw();
    };

    window.onmouseup = () => isDragging = false;

    // 7. 合并下载
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'google_review_avatar.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>
</body>
</html>
